<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca 8 Bolas - 2 Jogadores</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #061406;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            border: 18px solid #3c2a1f;
            border-radius: 24px;
            box-shadow: 0 0 80px rgba(0,0,0,0.98);
            background: #000;
            overflow: hidden;
        }
        canvas { display: block; border-radius: 8px; }
        #info {
            position: absolute; top: 20px; left: 20px; color: #fff;
            background: rgba(0,0,0,0.85); padding: 14px 22px; border-radius: 14px;
            font-size: 16.5px; z-index: 10; user-select: none; backdrop-filter: blur(6px);
        }
        #current-player {
            font-size: 21px; font-weight: bold; margin-top: 8px;
        }
        #instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #ccc; background: rgba(0,0,0,0.8); padding: 10px 28px;
            border-radius: 14px; font-size: 14.5px; z-index: 10;
        }
        #win-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #0f0; font-size: 68px; font-weight: bold;
            text-shadow: 0 0 50px #0f0; pointer-events: none; display: none;
            z-index: 30; animation: winPop 0.7s ease;
        }
        @keyframes winPop {
            0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.08); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="900" height="500"></canvas>
        <div id="info">
            <strong>Sinuca 8 Bolas</strong><br>
            Bolas restantes: <span id="balls-left">8</span><br>
            <span id="current-player">Jogador 1</span>
        </div>
        <div id="instructions">
            Arraste da bola branca • <strong>R</strong> Reiniciar
        </div>
        <div id="win-message"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');

        const W = 900, H = 500;
        const BORDER = 40;
        const BALL_RADIUS = 14;
        const POCKET_RADIUS = 21;
        const FRICTION = 0.978;

        let balls = [], cueBall = null;
        let isAiming = false, aimStartX = 0, aimStartY = 0;
        let sunkBalls = 0, currentPlayer = 1, gameWon = false;
        let ballsSunkThisTurn = 0;

        const pockets = [
            {x: BORDER, y: BORDER}, {x: W/2, y: BORDER}, {x: W - BORDER, y: BORDER},
            {x: BORDER, y: H - BORDER}, {x: W/2, y: H - BORDER}, {x: W - BORDER, y: H - BORDER}
        ];

        const ballColors = ['#fff', '#e74c3c', '#3498db', '#f39c12', '#9b59b6', '#f1c40f', '#2ecc71', '#c0392b', '#111'];

        class Ball {
            constructor(x, y, num) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.number = num;
                this.radius = BALL_RADIUS;
                this.color = ballColors[num] || '#111';
                this.sunk = false;
            }

            update() {
                if (this.sunk) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;

                if (Math.abs(this.vx) < 0.07) this.vx = 0;
                if (Math.abs(this.vy) < 0.07) this.vy = 0;

                // Colisão com bordas
                if (this.x - this.radius < BORDER) { this.x = BORDER + this.radius; this.vx = -this.vx * 0.9; }
                if (this.x + this.radius > W - BORDER) { this.x = W - BORDER - this.radius; this.vx = -this.vx * 0.9; }
                if (this.y - this.radius < BORDER) { this.y = BORDER + this.radius; this.vy = -this.vy * 0.9; }
                if (this.y + this.radius > H - BORDER) { this.y = H - BORDER - this.radius; this.vy = -this.vy * 0.9; }
            }

            draw() {
                if (this.sunk) return;
                const speed = Math.hypot(this.vx, this.vy);

                ctx.shadowColor = 'rgba(0,0,0,0.85)';
                ctx.shadowBlur = 16;
                ctx.shadowOffsetX = 6;
                ctx.shadowOffsetY = 7;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Brilho
                ctx.fillStyle = `rgba(255,255,255,${0.5 + speed * 0.03})`;
                ctx.beginPath();
                ctx.arc(this.x - 6, this.y - 7, 8, 0, Math.PI * 2);
                ctx.fill();

                if (this.number > 0) {
                    ctx.fillStyle = this.number === 8 ? '#fff' : '#000';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 1.5);
                }
            }
        }

        function createBalls() {
            balls = [];
            sunkBalls = 0;
            currentPlayer = 1;
            gameWon = false;
            ballsSunkThisTurn = 0;
            winMessage.style.display = 'none';

            updateUI();

            cueBall = new Ball(230, H/2, 0);
            balls.push(cueBall);

            const startX = 640;
            const startY = H/2 - 25;
            const positions = [
                {x:0, y:0, n:1}, {x:1,y:-1,n:2}, {x:1,y:1,n:3},
                {x:2,y:-2,n:4}, {x:2,y:0,n:8}, {x:2,y:2,n:5},
                {x:3,y:-1,n:6}, {x:3,y:1,n:7}
            ];

            positions.forEach(p => {
                const x = startX + p.x * (BALL_RADIUS * 2.14);
                const y = startY + p.y * (BALL_RADIUS * 2.1);
                balls.push(new Ball(x, y, p.n));
            });
        }

        function updateUI() {
            document.getElementById('balls-left').textContent = 8 - sunkBalls;
            const el = document.getElementById('current-player');
            el.textContent = `Jogador ${currentPlayer}`;
            el.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';
        }

        function respawnCueBall() {
            if (cueBall) {
                cueBall.x = 230;
                cueBall.y = H / 2;
                cueBall.vx = cueBall.vy = 0;
                cueBall.sunk = false;
            }
        }

        // Áudio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration, type = 'triangle', vol = 0.7) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration + 0.1);
        }

        function drawTable() {
            ctx.fillStyle = '#0b4d0b';
            ctx.fillRect(BORDER, BORDER, W - BORDER*2, H - BORDER*2);

            ctx.strokeStyle = '#3c2a1f';
            ctx.lineWidth = 38;
            ctx.strokeRect(BORDER/2, BORDER/2, W - BORDER, H - BORDER);

            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(W/2, BORDER + 15);
            ctx.lineTo(W/2, H - BORDER - 15);
            ctx.stroke();

            ctx.fillStyle = '#111';
            pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function checkCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const a = balls[i], b = balls[j];
                    if (a.sunk || b.sunk) continue;

                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < a.radius + b.radius && dist > 0) {
                        const speed = Math.hypot(a.vx, a.vy) + Math.hypot(b.vx, b.vy);
                        playSound(110 + speed * 7, 0.22, 'triangle', Math.min(1, speed/25));

                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle), cos = Math.cos(angle);
                        const v1 = a.vx * cos + a.vy * sin;
                        const v2 = b.vx * cos + b.vy * sin;

                        a.vx = (v2 * cos - v1 * sin) * 0.975;
                        a.vy = (v1 * cos + v2 * sin) * 0.975;
                        b.vx = (v1 * cos - v2 * sin) * 0.975;
                        b.vy = (v2 * cos + v1 * sin) * 0.975;

                        const overlap = (a.radius + b.radius - dist) / 2;
                        a.x -= dx / dist * overlap;
                        a.y -= dy / dist * overlap;
                        b.x += dx / dist * overlap;
                        b.y += dy / dist * overlap;
                    }
                }
            }
        }

        function checkPockets() {
            let sunkThisTurn = 0;
            for (let ball of balls) {
                if (ball.sunk) continue;
                for (let p of pockets) {
                    if (Math.hypot(ball.x - p.x, ball.y - p.y) < POCKET_RADIUS + BALL_RADIUS - 7) {
                        ball.sunk = true;
                        ball.vx = ball.vy = 0;

                        if (ball.number === 0) {
                            respawnCueBall();
                        } else {
                            sunkBalls++;
                            sunkThisTurn++;
                        }
                        playSound(65, 0.65, 'sine', 0.95);
                        break;
                    }
                }
            }
            return sunkThisTurn;
        }

        function allBallsStopped() {
            return balls.every(b => b.sunk || (Math.abs(b.vx) < 0.12 && Math.abs(b.vy) < 0.12));
        }

        function drawCueStick() {
            if (!isAiming || !cueBall || cueBall.sunk) return;

            const dx = cueBall.x - aimStartX;
            const dy = cueBall.y - aimStartY;
            const dist = Math.hypot(dx, dy);
            const power = Math.min(dist / 4.8, 100);
            const angle = Math.atan2(dy, dx);
            const dirX = Math.cos(angle);
            const dirY = Math.sin(angle);

            // Taco
            ctx.strokeStyle = '#d2b48c';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.beginPath();
            ctx.moveTo(cueBall.x - dirX * 30, cueBall.y - dirY * 30);
            ctx.lineTo(cueBall.x - dirX * (78 + power * 2.2), cueBall.y - dirY * (78 + power * 2.2));
            ctx.stroke();

            // Mira
            ctx.strokeStyle = `rgba(255, 240, 100, ${0.75 - power/200})`;
            ctx.lineWidth = 2.2;
            ctx.setLineDash([6, 24]);
            ctx.beginPath();
            ctx.moveTo(cueBall.x, cueBall.y);
            ctx.lineTo(cueBall.x + dirX * 950, cueBall.y + dirY * 950);
            ctx.stroke();
            ctx.setLineDash([]);

            // Barra de força
            ctx.fillStyle = '#222';
            ctx.fillRect(cueBall.x - 20, cueBall.y - 52, 40, 9);
            ctx.fillStyle = power > 70 ? '#ff3333' : '#ffeb3b';
            ctx.fillRect(cueBall.x - 19, cueBall.y - 51, 38 * (power / 100), 7);
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateUI();
        }

        function checkWin() {
            if (gameWon) return;
            const eight = balls.find(b => b.number === 8);
            if (eight && eight.sunk) {
                gameWon = true;
                winMessage.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';
                winMessage.innerHTML = `🎉 JOGADOR ${currentPlayer} VENCEU!`;
                winMessage.style.display = 'block';
                setTimeout(createBalls, 4500);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, W, H);
            drawTable();

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            checkCollisions();
            const sunkThisTurn = checkPockets();

            if (isAiming) drawCueStick();

            if (allBallsStopped() && !gameWon) {
                if (sunkThisTurn > 0) {
                    ballsSunkThisTurn += sunkThisTurn;
                } else {
                    if (ballsSunkThisTurn === 0) {
                        switchPlayer();
                    }
                    ballsSunkThisTurn = 0;
                }
                checkWin();
            }

            requestAnimationFrame(gameLoop);
        }

        // Controles
        function startAim(x, y) {
            if (gameWon || !cueBall || !allBallsStopped() || cueBall.sunk) return;
            isAiming = true;
            aimStartX = x;
            aimStartY = y;
        }

        function shoot(x, y) {
            if (!isAiming || !cueBall) return;
            const dx = cueBall.x - x;
            const dy = cueBall.y - y;
            const power = Math.min(Math.hypot(dx, dy) * 0.148, 23);

            cueBall.vx = dx * 0.148;
            cueBall.vy = dy * 0.148;
            isAiming = false;
            ballsSunkThisTurn = 0;
        }

        // Eventos Mouse/Touch
        const events = ['mousedown', 'touchstart'];
        events.forEach(ev => canvas.addEventListener(ev, e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            startAim(x, y);
        }, { passive: false }));

        canvas.addEventListener('mousemove', e => {
            if (!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            aimStartX = e.clientX - rect.left;
            aimStartY = e.clientY - rect.top;
        });

        const endEvents = ['mouseup', 'touchend'];
        endEvents.forEach(ev => canvas.addEventListener(ev, e => {
            e.preventDefault();
            if (!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.changedTouches[0].clientX) - rect.left;
            const y = (e.clientY || e.changedTouches[0].clientY) - rect.top;
            shoot(x, y);
        }, { passive: false }));

        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') createBalls();
        });

        // Iniciar
        createBalls();
        gameLoop();
    </script>
</body>
</html>
