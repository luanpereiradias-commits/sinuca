<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca 8 Bolas - 2 Jogadores</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #0a1a0a;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            border: 20px solid #3c2a1f;
            border-radius: 28px;
            box-shadow: 0 0 90px rgba(0,0,0,0.95);
            background: #000;
            overflow: hidden;
        }
        canvas { display: block; border-radius: 8px; }
        
        #info {
            position: absolute; top: 18px; left: 18px;
            color: #fff; background: rgba(0,0,0,0.85);
            padding: 16px 24px; border-radius: 16px;
            font-size: 16px; z-index: 10; user-select: none;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15);
        }
        #current-player { font-size: 22px; font-weight: bold; margin: 8px 0 4px; }
        
        #instructions {
            position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
            color: #ddd; background: rgba(0,0,0,0.8);
            padding: 10px 30px; border-radius: 16px;
            font-size: 14.5px; z-index: 10; user-select: none;
        }
        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffeb3b; font-size: 42px; font-weight: bold;
            text-shadow: 0 0 30px #000; pointer-events: none;
            display: none; z-index: 30; padding: 15px 40px;
            background: rgba(0,0,0,0.7); border-radius: 20px;
        }
        #win-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 72px; font-weight: bold; text-shadow: 0 0 60px #0f0;
            pointer-events: none; display: none; z-index: 30;
            animation: winPop 0.8s ease;
        }
        @keyframes winPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="900" height="500"></canvas>
        <div id="info">
            <strong>Sinuca 8 Bolas</strong><br>
            Bolas restantes: <span id="balls-left">8</span><br>
            <span id="current-player">Jogador 1</span><br>
            <span id="group-info" style="font-size:14px;"></span>
        </div>
        <div id="instructions">
            Arraste da branca • <strong>R</strong> Reiniciar • <strong>ESC</strong> Cancelar
        </div>
        <div id="message"></div>
        <div id="win-message"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');
        const messageEl = document.getElementById('message');

        const W = 900, H = 500;
        const BORDER = 40;
        const BALL_RADIUS = 14;
        const POCKET_RADIUS = 21;
        const FRICTION = 0.975;

        let balls = [], cueBall = null;
        let isAiming = false, aimStartX = 0, aimStartY = 0;
        let sunkBalls = 0, currentPlayer = 1, gameWon = false;
        let playerGroups = {1: null, 2: null}; // 'solid' ou 'stripe'
        let lastSunkThisTurn = 0;
        let foul = false;

        const pockets = [
            {x: BORDER, y: BORDER}, {x: W/2, y: BORDER}, {x: W - BORDER, y: BORDER},
            {x: BORDER, y: H - BORDER}, {x: W/2, y: H - BORDER}, {x: W - BORDER, y: H - BORDER}
        ];

        const ballColors = ['#fff', '#e74c3c', '#3498db', '#f39c12', '#9b59b6', '#f1c40f', '#2ecc71', '#c0392b', '#111'];

        class Ball {
            constructor(x, y, num) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.number = num;
                this.radius = BALL_RADIUS;
                this.color = ballColors[num] || '#111';
                this.sunk = false;
                this.isStripe = num > 8;
            }

            update() {
                if (this.sunk) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;

                if (Math.abs(this.vx) < 0.06) this.vx = 0;
                if (Math.abs(this.vy) < 0.06) this.vy = 0;

                // Bordas com bounce
                if (this.x - this.radius < BORDER) { this.x = BORDER + this.radius; this.vx = -this.vx * 0.85; }
                if (this.x + this.radius > W - BORDER) { this.x = W - BORDER - this.radius; this.vx = -this.vx * 0.85; }
                if (this.y - this.radius < BORDER) { this.y = BORDER + this.radius; this.vy = -this.vy * 0.85; }
                if (this.y + this.radius > H - BORDER) { this.y = H - BORDER - this.radius; this.vy = -this.vy * 0.85; }
            }

            draw() {
                if (this.sunk) return;
                const speed = Math.hypot(this.vx, this.vy);

                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 18;
                ctx.shadowOffsetX = 7;
                ctx.shadowOffsetY = 8;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                ctx.shadowBlur = 0;

                // Brilho
                ctx.fillStyle = `rgba(255,255,255,${0.6 + speed*0.04})`;
                ctx.beginPath();
                ctx.arc(this.x - 7, this.y - 8, 8.5, 0, Math.PI * 2);
                ctx.fill();

                if (this.number > 0) {
                    ctx.fillStyle = this.number === 8 ? '#fff' : '#000';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 1);
                }
            }
        }

        function createBalls() {
            balls = [];
            sunkBalls = 0;
            currentPlayer = 1;
            gameWon = false;
            playerGroups = {1: null, 2: null};
            foul = false;
            lastSunkThisTurn = 0;
            winMessage.style.display = 'none';
            messageEl.style.display = 'none';

            updateUI();

            cueBall = new Ball(230, H/2, 0);
            balls.push(cueBall);

            const startX = 640;
            const startY = H/2 - 26;
            const positions = [
                {x:0, y:0, n:1}, {x:1,y:-1,n:2}, {x:1,y:1,n:3},
                {x:2,y:-2,n:4}, {x:2,y:0,n:8}, {x:2,y:2,n:5},
                {x:3,y:-1,n:6}, {x:3,y:1,n:7}
            ];

            positions.forEach(p => {
                const x = startX + p.x * (BALL_RADIUS * 2.16);
                const y = startY + p.y * (BALL_RADIUS * 2.12);
                balls.push(new Ball(x, y, p.n));
            });
        }

        function updateUI() {
            document.getElementById('balls-left').textContent = 8 - sunkBalls;
            const el = document.getElementById('current-player');
            el.textContent = `Jogador ${currentPlayer}`;
            el.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';

            const groupEl = document.getElementById('group-info');
            const group = playerGroups[currentPlayer];
            groupEl.textContent = group ? (group === 'solid' ? '● Sólidas' : '◉ Listradas') : 'Escolha o grupo';
        }

        function showMessage(text, color = '#ffeb3b', duration = 1800) {
            messageEl.textContent = text;
            messageEl.style.color = color;
            messageEl.style.display = 'block';
            setTimeout(() => messageEl.style.display = 'none', duration);
        }

        function respawnCueBall() {
            cueBall.x = 230; cueBall.y = H/2;
            cueBall.vx = cueBall.vy = 0;
            cueBall.sunk = false;
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration, type = 'triangle', vol = 0.7) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.value = vol;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration + 0.1);
            } catch(e) {}
        }

        function drawTable() {
            ctx.fillStyle = '#0a3d0a';
            ctx.fillRect(BORDER, BORDER, W - BORDER*2, H - BORDER*2);

            ctx.strokeStyle = '#3c2a1f';
            ctx.lineWidth = 42;
            ctx.strokeRect(BORDER/2, BORDER/2, W - BORDER, H - BORDER);

            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(W/2, BORDER + 18);
            ctx.lineTo(W/2, H - BORDER - 18);
            ctx.stroke();

            ctx.fillStyle = '#111';
            pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // ... (checkCollisions, checkPockets, allBallsStopped permanecem similares, mas com melhorias)

        function checkCollisions() { /* mesmo código aprimorado anterior */ 
            // (Mantive a versão anterior otimizada)
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const a = balls[i], b = balls[j];
                    if (a.sunk || b.sunk) continue;

                    const dx = b.x - a.x, dy = b.y - a.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < a.radius + b.radius && dist > 0) {
                        const speed = Math.hypot(a.vx, a.vy) + Math.hypot(b.vx, b.vy);
                        playSound(105 + speed * 8, 0.18);

                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle), cos = Math.cos(angle);
                        const v1 = a.vx * cos + a.vy * sin;
                        const v2 = b.vx * cos + b.vy * sin;

                        a.vx = (v2 * cos - v1 * sin) * 0.965;
                        a.vy = (v1 * cos + v2 * sin) * 0.965;
                        b.vx = (v1 * cos - v2 * sin) * 0.965;
                        b.vy = (v2 * cos + v1 * sin) * 0.965;

                        const overlap = (a.radius + b.radius - dist) / 2;
                        a.x -= dx / dist * overlap;
                        a.y -= dy / dist * overlap;
                        b.x += dx / dist * overlap;
                        b.y += dy / dist * overlap;
                    }
                }
            }
        }

        function checkPockets() {
            let sunkThisTurn = 0;
            for (let ball of balls) {
                if (ball.sunk) continue;
                for (let p of pockets) {
                    if (Math.hypot(ball.x - p.x, ball.y - p.y) < POCKET_RADIUS + BALL_RADIUS - 5) {
                        ball.sunk = true;
                        ball.vx = ball.vy = 0;

                        if (ball.number === 0) {
                            foul = true;
                            respawnCueBall();
                        } else {
                            sunkBalls++;
                            sunkThisTurn++;
                        }
                        playSound(62, 0.7, 'sine');
                        break;
                    }
                }
            }
            return sunkThisTurn;
        }

        function allBallsStopped() {
            return balls.every(b => b.sunk || Math.abs(b.vx) < 0.07 && Math.abs(b.vy) < 0.07);
        }

        function drawCueStick() {
            if (!isAiming || !cueBall || cueBall.sunk) return;

            const dx = cueBall.x - aimStartX;
            const dy = cueBall.y - aimStartY;
            const dist = Math.hypot(dx, dy);
            const power = Math.min(dist / 4, 100);
            const angle = Math.atan2(dy, dx);
            const dirX = Math.cos(angle);
            const dirY = Math.sin(angle);

            // Mira longa com previsão
            ctx.strokeStyle = `rgba(255, 240, 100, 0.75)`;
            ctx.lineWidth = 2.8;
            ctx.setLineDash([7, 25]);
            ctx.beginPath();
            ctx.moveTo(cueBall.x, cueBall.y);
            ctx.lineTo(cueBall.x + dirX * 1100, cueBall.y + dirY * 1100);
            ctx.stroke();
            ctx.setLineDash([]);

            // Taco
            ctx.strokeStyle = '#d2b48c';
            ctx.lineWidth = 9;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0,0,0,0.9)';
            ctx.beginPath();
            ctx.moveTo(cueBall.x - dirX * 35, cueBall.y - dirY * 35);
            ctx.lineTo(cueBall.x - dirX * (82 + power * 2.5), cueBall.y - dirY * (82 + power * 2.5));
            ctx.stroke();

            // Força
            ctx.fillStyle = power > 70 ? '#ff3333' : '#ffeb3b';
            ctx.fillRect(cueBall.x - 22, cueBall.y - 58, 44, 9);
            ctx.fillStyle = '#111';
            ctx.fillRect(cueBall.x - 22, cueBall.y - 58, 44 * (power / 100), 9);
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateUI();
        }

        function checkWin() {
            if (gameWon) return;
            const eight = balls.find(b => b.number === 8);
            if (eight && eight.sunk) {
                gameWon = true;
                winMessage.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';
                winMessage.innerHTML = `🎉 JOGADOR ${currentPlayer} VENCEU!`;
                winMessage.style.display = 'block';
                setTimeout(createBalls, 5000);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, W, H);
            drawTable();

            balls.forEach(ball => { ball.update(); ball.draw(); });

            checkCollisions();
            const sunkThisTurn = checkPockets();

            if (isAiming) drawCueStick();

            if (allBallsStopped() && !gameWon) {
                if (foul) {
                    showMessage("FALTA!", "#ff4444");
                    switchPlayer();
                    foul = false;
                } else if (sunkThisTurn === 0) {
                    switchPlayer();
                }
                checkWin();
            }

            requestAnimationFrame(gameLoop);
        }

        // Controles (mesmo de antes, com ESC)
        function startAim(x, y) {
            if (gameWon || !cueBall || !allBallsStopped() || cueBall.sunk) return;
            isAiming = true;
            aimStartX = x;
            aimStartY = y;
        }

        function shoot(x, y) {
            if (!isAiming || !cueBall) return;
            const dx = cueBall.x - x;
            const dy = cueBall.y - y;
            const power = Math.min(Math.hypot(dx, dy) * 0.138, 24);

            cueBall.vx = dx * 0.138;
            cueBall.vy = dy * 0.138;
            isAiming = false;
        }

        // Eventos mouse + touch (mesmo código anterior)

        const events = ['mousedown', 'touchstart'];
        events.forEach(ev => canvas.addEventListener(ev, e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            startAim(x, y);
        }, { passive: false }));

        canvas.addEventListener('mousemove', e => {
            if (!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            aimStartX = e.clientX - rect.left;
            aimStartY = e.clientY - rect.top;
        });

        const endEvents = ['mouseup', 'touchend'];
        endEvents.forEach(ev => canvas.addEventListener(ev, e => {
            e.preventDefault();
            if (!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.changedTouches[0].clientX) - rect.left;
            const y = (e.clientY || e.changedTouches[0].clientY) - rect.top;
            shoot(x, y);
        }, { passive: false }));

        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') createBalls();
            if (e.key === 'Escape' && isAiming) isAiming = false;
        });

        createBalls();
        gameLoop();
    </script>
</body>
</html>
