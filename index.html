<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca 8 Bolas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a3a1a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            position: relative;
            border: 8px solid #8B4513;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            background: #0b4d0b;
        }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #ddd;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            line-height: 1.4;
        }
        #win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 52px;
            font-weight: bold;
            text-shadow: 0 0 20px #0f0;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="900" height="500"></canvas>
        <div id="info">
            <strong>Sinuca 8 Bolas</strong><br>
            Bolas restantes: <span id="balls-left">7</span>
        </div>
        <div id="instructions">
            Clique + arraste na branca para tacar<br>
            <strong>R</strong> = Reiniciar • <strong>C</strong> = Matar todas as bolas
        </div>
        <div id="win-message">🎉 VOCÊ VENCEU!</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');
        
        const TABLE_WIDTH = 900;
        const TABLE_HEIGHT = 500;
        const BORDER = 40;
        const POCKET_RADIUS = 18;
        const BALL_RADIUS = 14;
        const FRICTION = 0.985;

        let balls = [];
        let cueBall = null;
        let isAiming = false;
        let aimStartX = 0;
        let aimStartY = 0;
        let sunkBalls = 0;
        let gameWon = false;

        const pockets = [
            {x: BORDER, y: BORDER},
            {x: TABLE_WIDTH/2, y: BORDER},
            {x: TABLE_WIDTH - BORDER, y: BORDER},
            {x: BORDER, y: TABLE_HEIGHT - BORDER},
            {x: TABLE_WIDTH/2, y: TABLE_HEIGHT - BORDER},
            {x: TABLE_WIDTH - BORDER, y: TABLE_HEIGHT - BORDER}
        ];

        const ballColors = ['#fff','#f00','#00f','#f60','#800080','#ff0','#008000','#800000'];

        class Ball {
            constructor(x, y, number) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.number = number;
                this.radius = BALL_RADIUS;
                this.color = ballColors[number];
                this.sunk = false;
            }
            
            draw() {
                if (this.sunk) return;
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 5, 6, 0, Math.PI * 2);
                ctx.fill();
                
                if (this.number > 0) {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 1);
                }
            }
            
            update() {
                if (this.sunk) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;
                if (Math.abs(this.vx) < 0.1) this.vx = 0;
                if (Math.abs(this.vy) < 0.1) this.vy = 0;

                if (this.x - this.radius < BORDER) { this.x = BORDER + this.radius; this.vx = -this.vx * 0.9; }
                if (this.x + this.radius > TABLE_WIDTH - BORDER) { this.x = TABLE_WIDTH - BORDER - this.radius; this.vx = -this.vx * 0.9; }
                if (this.y - this.radius < BORDER) { this.y = BORDER + this.radius; this.vy = -this.vy * 0.9; }
                if (this.y + this.radius > TABLE_HEIGHT - BORDER) { this.y = TABLE_HEIGHT - BORDER - this.radius; this.vy = -this.vy * 0.9; }
            }
        }

        function createBalls() {
            balls = [];
            sunkBalls = 0;
            gameWon = false;
            winMessage.style.display = 'none';
            document.getElementById('balls-left').textContent = '7';

            cueBall = new Ball(250, TABLE_HEIGHT/2, 0);
            balls.push(cueBall);

            const startX = 620;
            const startY = TABLE_HEIGHT/2 - 20;
            const positions = [
                {x: 0, y: 0},
                {x: 1, y: -1}, {x: 1, y: 1},
                {x: 2, y: -2}, {x: 2, y: 0}, {x: 2, y: 2},
                {x: 3, y: -1}, {x: 3, y: 1}
            ];

            positions.forEach((pos, i) => {
                const x = startX + pos.x * (BALL_RADIUS * 2.1);
                const y = startY + pos.y * (BALL_RADIUS * 2.05);
                balls.push(new Ball(x, y, i+1));
            });
        }

        function sinkAllBalls() {
            balls.forEach(ball => {
                if (ball.number !== 0) { // não afunda a branca
                    ball.sunk = true;
                    ball.vx = ball.vy = 0;
                }
            });
            sunkBalls = 7;
            document.getElementById('balls-left').textContent = '0';
        }

        function drawTable() {
            ctx.fillStyle = '#0b4d0b';
            ctx.fillRect(BORDER, BORDER, TABLE_WIDTH - BORDER*2, TABLE_HEIGHT - BORDER*2);
            
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 25;
            ctx.strokeRect(BORDER/2, BORDER/2, TABLE_WIDTH - BORDER, TABLE_HEIGHT - BORDER);
            
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(TABLE_WIDTH/2, BORDER);
            ctx.lineTo(TABLE_WIDTH/2, TABLE_HEIGHT - BORDER);
            ctx.stroke();

            ctx.fillStyle = '#111';
            pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function checkCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    if (b1.sunk || b2.sunk) continue;

                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < b1.radius + b2.radius && dist > 0) {
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle), cos = Math.cos(angle);

                        const vx1 = b1.vx * cos + b1.vy * sin;
                        const vy1 = b1.vy * cos - b1.vx * sin;
                        const vx2 = b2.vx * cos + b2.vy * sin;
                        const vy2 = b2.vy * cos - b2.vx * sin;

                        b1.vx = vx2 * cos - vy1 * sin;
                        b1.vy = vy1 * cos + vx2 * sin;
                        b2.vx = vx1 * cos - vy2 * sin;
                        b2.vy = vy2 * cos + vx1 * sin;

                        const overlap = (b1.radius + b2.radius - dist) / 2;
                        b1.x -= dx/dist * overlap;
                        b1.y -= dy/dist * overlap;
                        b2.x += dx/dist * overlap;
                        b2.y += dy/dist * overlap;
                    }
                }
            }
        }

        function checkPockets() {
            for (let ball of balls) {
                if (ball.sunk) continue;
                for (let p of pockets) {
                    if (Math.hypot(ball.x - p.x, ball.y - p.y) < POCKET_RADIUS + BALL_RADIUS - 5) {
                        ball.sunk = true;
                        ball.vx = ball.vy = 0;
                        sunkBalls++;
                        document.getElementById('balls-left').textContent = (7 - sunkBalls);
                        break;
                    }
                }
            }
        }

        function allBallsStopped() {
            return balls.every(b => !b.sunk && Math.abs(b.vx) < 0.2 && Math.abs(b.vy) < 0.2);
        }

        function drawAimLine() {
            if (!isAiming || !cueBall) return;
            const dx = cueBall.x - aimStartX;
            const dy = cueBall.y - aimStartY;
            const power = Math.min(Math.hypot(dx, dy) / 3, 80);

            ctx.strokeStyle = 'rgba(255,255,255,0.7)';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 8]);
            ctx.beginPath();
            ctx.moveTo(cueBall.x, cueBall.y);
            ctx.lineTo(cueBall.x + dx * (power/12), cueBall.y + dy * (power/12));
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(cueBall.x - dx*0.1, cueBall.y - dy*0.1);
            ctx.lineTo(cueBall.x - dx*1.8, cueBall.y - dy*1.8);
            ctx.stroke();
        }

        function checkWin() {
            if (gameWon || sunkBalls < 7) return;
            gameWon = true;
            winMessage.style.display = 'block';

            setTimeout(() => {
                createBalls();
            }, 2800);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);
            drawTable();

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            checkCollisions();
            checkPockets();

            if (isAiming) drawAimLine();

            if (allBallsStopped()) {
                checkWin();
            }

            requestAnimationFrame(gameLoop);
        }

        // Controles
        canvas.addEventListener('mousedown', e => {
            if (gameWon || !cueBall || !allBallsStopped()) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            if (Math.hypot(mx - cueBall.x, my - cueBall.y) < 50) {
                isAiming = true;
                aimStartX = mx;
                aimStartY = my;
            }
        });

        canvas.addEventListener('mousemove', e => {
            if (!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            aimStartX = e.clientX - rect.left;
            aimStartY = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseup', e => {
            if (!isAiming || !cueBall || gameWon) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            const dx = cueBall.x - mx;
            const dy = cueBall.y - my;

            cueBall.vx = dx * 0.13;
            cueBall.vy = dy * 0.13;
            isAiming = false;
        });

        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') createBalls();
            if (e.key.toLowerCase() === 'c') sinkAllBalls();
        });

        // Iniciar
        createBalls();
        gameLoop();
    </script>
</body>
</html>
