<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca 8 Bolas - 2 Jogadores</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #061406;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            gap: 30px;
        }
        #game-container {
            position: relative;
            border: 20px solid #3c2a1f;
            border-radius: 28px;
            box-shadow: 0 0 90px rgba(0,0,0,0.98);
            background: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
            border-radius: 10px;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.85);
            padding: 15px 25px;
            border-radius: 16px;
            font-size: 17px;
            z-index: 10;
            user-select: none;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            min-width: 200px;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ddd;
            background: rgba(0,0,0,0.8);
            padding: 12px 32px;
            border-radius: 16px;
            font-size: 15px;
            z-index: 10;
            user-select: none;
            white-space: nowrap;
        }
        #win-message, #foul-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 0 60px #0f0;
            pointer-events: none;
            display: none;
            z-index: 30;
            text-align: center;
            line-height: 1.1;
        }
        #foul-message {
            background: rgba(200, 30, 30, 0.95);
            color: white;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 22px;
            top: 35%;
        }
        #side-image {
            max-height: 520px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>
    <!-- Imagem à esquerda -->
    <img id="side-image" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" alt="Erro 405" style="display:none;">

    <div id="game-container">
        <canvas id="canvas" width="900" height="500"></canvas>
        
        <div id="info">
            <strong>Sinuca 8 Bolas</strong><br>
            Bolas restantes: <span id="balls-left">7</span><br>
            <span id="current-player">Jogador 1</span>
            <span id="group-info" style="font-size:14px; display:block; margin-top:6px;"></span>
        </div>

        <div id="instructions">
            Arraste da bola branca • <strong>R</strong> Reiniciar
        </div>
        <div id="win-message"></div>
        <div id="foul-message">FOUL!</div>
    </div>

    <script>
        // === O restante do código do jogo continua igual ao da versão anterior ===
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');
        const foulMessage = document.getElementById('foul-message');

        const W = 900, H = 500;
        const BORDER = 40;
        const BALL_RADIUS = 14;
        const POCKET_RADIUS = 22;
        const FRICTION = 0.978;

        let balls = [], cueBall = null;
        let isAiming = false, aimStartX = 0, aimStartY = 0;
        let sunkBalls = 0, currentPlayer = 1, gameWon = false;
        let playerGroups = {1: null, 2: null};
        let lastSunkThisTurn = 0;
        let turnInProgress = false;

        const pockets = [
            {x: BORDER, y: BORDER}, {x: W/2, y: BORDER}, {x: W - BORDER, y: BORDER},
            {x: BORDER, y: H - BORDER}, {x: W/2, y: H - BORDER}, {x: W - BORDER, y: H - BORDER}
        ];

        const ballColors = ['#fff', '#e74c3c', '#3498db', '#f39c12', '#9b59b6', '#f1c40f', '#2ecc71', '#c0392b', '#111'];

        class Ball {
            constructor(x, y, num) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.number = num;
                this.radius = BALL_RADIUS;
                this.color = ballColors[num] || '#111';
                this.sunk = false;
            }

            update() {
                if (this.sunk) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;
                if (Math.abs(this.vx) < 0.08) this.vx = 0;
                if (Math.abs(this.vy) < 0.08) this.vy = 0;

                if (this.x - this.radius < BORDER) { this.x = BORDER + this.radius; this.vx = -this.vx * 0.88; }
                if (this.x + this.radius > W - BORDER) { this.x = W - BORDER - this.radius; this.vx = -this.vx * 0.88; }
                if (this.y - this.radius < BORDER) { this.y = BORDER + this.radius; this.vy = -this.vy * 0.88; }
                if (this.y + this.radius > H - BORDER) { this.y = H - BORDER - this.radius; this.vy = -this.vy * 0.88; }
            }

            draw() {
                if (this.sunk) return;
                const speed = Math.hypot(this.vx, this.vy);
                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 18;
                ctx.shadowOffsetX = 7;
                ctx.shadowOffsetY = 8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = `rgba(255,255,255,${0.55 + speed * 0.04})`;
                ctx.beginPath();
                ctx.arc(this.x - 6.5, this.y - 7.5, 8.5, 0, Math.PI * 2);
                ctx.fill();

                if (this.number > 0) {
                    ctx.fillStyle = this.number === 8 ? '#fff' : '#000';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 1.5);
                }
            }
        }

        function createBalls() { /* ... mesmo código anterior ... */ 
            // (Mantive o resto igual para não ficar gigante aqui)
            balls = [];
            sunkBalls = 0;
            currentPlayer = 1;
            gameWon = false;
            playerGroups = {1: null, 2: null};
            turnInProgress = false;
            winMessage.style.display = 'none';
            foulMessage.style.display = 'none';
            updateUI();

            cueBall = new Ball(230, H/2, 0);
            balls.push(cueBall);

            const startX = 640;
            const startY = H/2 - 28;
            const positions = [
                {x:0,y:0,n:1},{x:1,y:-1,n:2},{x:1,y:1,n:3},
                {x:2,y:-2,n:4},{x:2,y:0,n:8},{x:2,y:2,n:5},
                {x:3,y:-1,n:6},{x:3,y:1,n:7}
            ];

            positions.forEach(p => {
                const x = startX + p.x * (BALL_RADIUS * 2.16);
                const y = startY + p.y * (BALL_RADIUS * 2.12);
                balls.push(new Ball(x, y, p.n));
            });
        }

        function updateUI() { /* mesmo código */ 
            document.getElementById('balls-left').textContent = 7 - sunkBalls;
            const playerEl = document.getElementById('current-player');
            playerEl.textContent = `Jogador ${currentPlayer}`;
            playerEl.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';
            const groupEl = document.getElementById('group-info');
            const group = playerGroups[currentPlayer];
            groupEl.textContent = group ? (group === 'solid' ? '● Sólidas' : '▥ Listadas') : 'Mesa Aberta';
        }

        // ... (o restante do código do jogo - update, collisions, pockets, etc. - é idêntico à versão anterior)

        // Para economizar espaço, o jogo completo está na resposta anterior. 
        // Copie o <script> inteiro da versão anterior e cole aqui substituindo este comentário.

        createBalls();
        gameLoop();
    </script>
</body>
</html>
