<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca 8 Bolas - 2 Jogadores</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a1f0a;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            border: 16px solid #3c2a1f;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(0,0,0,0.95);
            background: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #0b4d0b;
            border-radius: 6px;
        }
        #info {
            position: absolute;
            top: 18px;
            left: 18px;
            color: #fff;
            background: rgba(0,0,0,0.85);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            z-index: 10;
            user-select: none;
            backdrop-filter: blur(4px);
        }
        #current-player {
            font-size: 18px;
            font-weight: bold;
            margin-top: 6px;
        }
        #instructions {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: #ddd;
            background: rgba(0,0,0,0.85);
            padding: 10px 26px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            z-index: 10;
            user-select: none;
        }
        #win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 62px;
            font-weight: bold;
            text-shadow: 0 0 40px #0f0;
            pointer-events: none;
            display: none;
            z-index: 30;
            animation: winPop 0.6s ease;
        }
        @keyframes winPop {
            0% { transform: translate(-50%, -50%) scale(0.6); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="900" height="500"></canvas>
        <div id="info">
            <strong>Sinuca 8 Bolas</strong><br>
            Bolas restantes: <span id="balls-left">8</span><br>
            <span id="current-player">Jogador 1</span>
        </div>
        <div id="instructions">
            Arraste da bola branca • <strong>R</strong> Reiniciar
        </div>
        <div id="win-message"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');

        const TABLE_WIDTH = 900;
        const TABLE_HEIGHT = 500;
        const BORDER = 40;
        const POCKET_RADIUS = 20;
        const BALL_RADIUS = 14;
        const FRICTION = 0.982;

        let balls = [];
        let cueBall = null;
        let isAiming = false;
        let aimStartX = 0, aimStartY = 0;
        let sunkBalls = 0;
        let currentPlayer = 1;
        let gameWon = false;

        const pockets = [
            {x: BORDER, y: BORDER}, {x: TABLE_WIDTH/2, y: BORDER}, {x: TABLE_WIDTH - BORDER, y: BORDER},
            {x: BORDER, y: TABLE_HEIGHT - BORDER}, {x: TABLE_WIDTH/2, y: TABLE_HEIGHT - BORDER}, 
            {x: TABLE_WIDTH - BORDER, y: TABLE_HEIGHT - BORDER}
        ];

        const ballColors = ['#ffffff', '#e74c3c', '#3498db', '#f39c12', '#9b59b6', '#f1c40f', '#2ecc71', '#c0392b', '#111111'];

        class Ball {
            constructor(x, y, number) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.number = number;
                this.radius = BALL_RADIUS;
                this.color = ballColors[number] || '#111';
                this.sunk = false;
            }

            update() {
                if (this.sunk) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;

                if (Math.abs(this.vx) < 0.08) this.vx = 0;
                if (Math.abs(this.vy) < 0.08) this.vy = 0;

                if (this.x - this.radius < BORDER) { this.x = BORDER + this.radius; this.vx = -this.vx * 0.88; }
                if (this.x + this.radius > TABLE_WIDTH - BORDER) { this.x = TABLE_WIDTH - BORDER - this.radius; this.vx = -this.vx * 0.88; }
                if (this.y - this.radius < BORDER) { this.y = BORDER + this.radius; this.vy = -this.vy * 0.88; }
                if (this.y + this.radius > TABLE_HEIGHT - BORDER) { this.y = TABLE_HEIGHT - BORDER - this.radius; this.vy = -this.vy * 0.88; }
            }

            draw() {
                if (this.sunk) return;
                const speed = Math.hypot(this.vx, this.vy);

                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 14;
                ctx.shadowOffsetX = 5;
                ctx.shadowOffsetY = 6;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.fillStyle = `rgba(255,255,255,${0.45 + speed * 0.025})`;
                ctx.beginPath();
                ctx.arc(this.x - 6, this.y - 6, 7.5, 0, Math.PI * 2);
                ctx.fill();

                if (this.number > 0) {
                    ctx.fillStyle = this.number === 8 ? '#fff' : '#000';
                    ctx.font = 'bold 13.5px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 1);
                }
            }
        }

        function createBalls() {
            balls = [];
            sunkBalls = 0;
            currentPlayer = 1;
            gameWon = false;
            winMessage.style.display = 'none';
            updateUI();

            cueBall = new Ball(235, TABLE_HEIGHT/2, 0);
            balls.push(cueBall);

            const startX = 635;
            const startY = TABLE_HEIGHT/2 - 22;
            const positions = [
                {x:0, y:0, num:1}, {x:1, y:-1, num:2}, {x:1, y:1, num:3},
                {x:2, y:-2, num:4}, {x:2, y:0, num:8}, {x:2, y:2, num:5},
                {x:3, y:-1, num:6}, {x:3, y:1, num:7}
            ];

            positions.forEach(p => {
                const x = startX + p.x * (BALL_RADIUS * 2.13);
                const y = startY + p.y * (BALL_RADIUS * 2.09);
                balls.push(new Ball(x, y, p.num));
            });
        }

        function updateUI() {
            document.getElementById('balls-left').textContent = 8 - sunkBalls;
            const playerEl = document.getElementById('current-player');
            playerEl.textContent = `Jogador ${currentPlayer}`;
            playerEl.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';
        }

        function respawnCueBall() {
            if (cueBall) {
                cueBall.x = 235;
                cueBall.y = TABLE_HEIGHT / 2;
                cueBall.vx = cueBall.vy = 0;
                cueBall.sunk = false;
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playHitSound(volume = 0.7, freq = 180) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function drawTable() {
            ctx.fillStyle = '#0b4d0b';
            ctx.fillRect(BORDER, BORDER, TABLE_WIDTH - BORDER*2, TABLE_HEIGHT - BORDER*2);

            ctx.strokeStyle = '#3c2a1f';
            ctx.lineWidth = 36;
            ctx.strokeRect(BORDER/2, BORDER/2, TABLE_WIDTH - BORDER, TABLE_HEIGHT - BORDER);

            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(TABLE_WIDTH/2, BORDER + 12);
            ctx.lineTo(TABLE_WIDTH/2, TABLE_HEIGHT - BORDER - 12);
            ctx.stroke();

            ctx.fillStyle = '#111';
            pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function checkCollisions() { /* mesmo código anterior */ 
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    if (b1.sunk || b2.sunk) continue;

                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < b1.radius + b2.radius && dist > 0) {
                        const speed = Math.hypot(b1.vx, b1.vy) + Math.hypot(b2.vx, b2.vy);
                        playHitSound(Math.min(1, speed / 18), 140 + speed * 4);

                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle), cos = Math.cos(angle);

                        const v1 = b1.vx * cos + b1.vy * sin;
                        const v2 = b2.vx * cos + b2.vy * sin;

                        b1.vx = (v2 * cos - v1 * sin) * 0.98;
                        b1.vy = (v1 * cos + v2 * sin) * 0.98;
                        b2.vx = (v1 * cos - v2 * sin) * 0.98;
                        b2.vy = (v2 * cos + v1 * sin) * 0.98;

                        const overlap = (b1.radius + b2.radius - dist) / 2;
                        b1.x -= dx / dist * overlap;
                        b1.y -= dy / dist * overlap;
                        b2.x += dx / dist * overlap;
                        b2.y += dy / dist * overlap;
                    }
                }
            }
        }

        function checkPockets() {
            let sunkThisTurn = 0;
            for (let ball of balls) {
                if (ball.sunk) continue;
                for (let p of pockets) {
                    if (Math.hypot(ball.x - p.x, ball.y - p.y) < POCKET_RADIUS + BALL_RADIUS - 6) {
                        ball.sunk = true;
                        ball.vx = ball.vy = 0;

                        if (ball.number === 0) {
                            respawnCueBall();
                        } else {
                            sunkBalls++;
                            sunkThisTurn++;
                            document.getElementById('balls-left').textContent = 8 - sunkBalls;
                        }
                        playHitSound(0.85, 80);
                        break;
                    }
                }
            }
            return sunkThisTurn;
        }

        function allBallsStopped() {
            return balls.every(b => b.sunk || (Math.abs(b.vx) < 0.1 && Math.abs(b.vy) < 0.1));
        }

        function drawCueStick() {
            if (!isAiming || !cueBall || cueBall.sunk) return;

            const dx = cueBall.x - aimStartX;
            const dy = cueBall.y - aimStartY;
            const dist = Math.hypot(dx, dy);
            const power = Math.min(dist / 4.2, 100);

            const angle = Math.atan2(dy, dx);
            const dirX = Math.cos(angle);
            const dirY = Math.sin(angle);

            ctx.strokeStyle = '#d2b48c';
            ctx.lineWidth = 7;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.7)';
            ctx.beginPath();
            ctx.moveTo(cueBall.x - dirX * 25, cueBall.y - dirY * 25);
            ctx.lineTo(cueBall.x - dirX * (70 + power * 1.8), cueBall.y - dirY * (70 + power * 1.8));
            ctx.stroke();

            ctx.strokeStyle = `rgba(255, 255, 100, ${0.75 - power/200})`;
            ctx.lineWidth = 2.2;
            ctx.setLineDash([6, 18]);
            ctx.beginPath();
            ctx.moveTo(cueBall.x, cueBall.y);
            ctx.lineTo(cueBall.x + dirX * 920, cueBall.y + dirY * 920);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = power > 65 ? '#f33' : '#ffeb3b';
            ctx.fillRect(cueBall.x - 18, cueBall.y - 45, 36, 6);
            ctx.fillStyle = '#222';
            ctx.fillRect(cueBall.x - 18, cueBall.y - 45, 36 * (power / 100), 6);
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateUI();
        }

        function checkWin() {
            if (gameWon) return;
            const eightBall = balls.find(b => b.number === 8);
            if (eightBall && eightBall.sunk) {
                gameWon = true;
                winMessage.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';
                winMessage.innerHTML = `🎉 JOGADOR ${currentPlayer} VENCEU!`;
                winMessage.style.display = 'block';
                setTimeout(() => createBalls(), 3500);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);
            drawTable();

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            checkCollisions();
            const sunkThisTurn = checkPockets();

            if (isAiming) drawCueStick();

            if (allBallsStopped() && !gameWon) {
                if (sunkThisTurn === 0) {
                    switchPlayer();
                }
                checkWin();
            }

            requestAnimationFrame(gameLoop);
        }

        // Controles (mesmo de antes)
        function startAim(x, y) {
            if (gameWon || !cueBall || !allBallsStopped() || cueBall.sunk) return;
            isAiming = true;
            aimStartX = x;
            aimStartY = y;
        }

        function shoot(x, y) {
            if (!isAiming || !cueBall) return;
            const dx = cueBall.x - x;
            const dy = cueBall.y - y;
            const power = Math.min(Math.hypot(dx, dy) * 0.138, 21);

            cueBall.vx = dx * 0.138;
            cueBall.vy = dy * 0.138;
            isAiming = false;
        }

        // Eventos Mouse + Touch
        ['mousedown', 'touchstart'].forEach(ev => {
            canvas.addEventListener(ev, e => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                startAim(x, y);
            }, { passive: false });
        });

        ['mousemove', 'touchmove'].forEach(ev => {
            canvas.addEventListener(ev, e => {
                if (!isAiming) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                aimStartX = (e.clientX || e.touches[0].clientX) - rect.left;
                aimStartY = (e.clientY || e.touches[0].clientY) - rect.top;
            }, { passive: false });
        });

        ['mouseup', 'touchend'].forEach(ev => {
            canvas.addEventListener(ev, e => {
                e.preventDefault();
                if (!isAiming) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.changedTouches[0].clientX) - rect.left;
                const y = (e.clientY || e.changedTouches[0].clientY) - rect.top;
                shoot(x, y);
            }, { passive: false });
        });

        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') createBalls();
        });

        // Iniciar
        createBalls();
        gameLoop();
    </script>
</body>
</html>
