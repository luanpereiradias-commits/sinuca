<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca 8 Bolas - Melhorada</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #041004;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            border: 22px solid #3c2a1f;
            border-radius: 30px;
            box-shadow: 0 0 100px rgba(0,0,0,0.97);
            background: #000;
            overflow: hidden;
        }
        canvas { display: block; border-radius: 10px; }
        
        #info {
            position: absolute; top: 18px; left: 18px;
            color: #fff; background: rgba(0,0,0,0.88);
            padding: 16px 26px; border-radius: 18px;
            font-size: 17px; z-index: 10; user-select: none;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
        }
        #current-player { font-size: 23px; font-weight: bold; margin: 6px 0; }
        
        #instructions {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            color: #ccc; background: rgba(0,0,0,0.85);
            padding: 12px 30px; border-radius: 18px;
            font-size: 15px; z-index: 10; user-select: none;
        }
        #win-message {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 78px; font-weight: bold;
            text-shadow: 0 0 70px #0f0;
            pointer-events: none; display: none; z-index: 30;
            text-align: center; animation: winPop 0.9s ease;
        }
        @keyframes winPop {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.12); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        button {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 18px; background: #222; color: #fff;
            border: none; border-radius: 12px; font-size: 15px;
            cursor: pointer; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="900" height="500"></canvas>
        
        <div id="info">
            <strong>Sinuca 8 Bolas</strong><br>
            Bolas restantes: <span id="balls-left">7</span><br>
            <span id="current-player">Jogador 1</span>
            <span id="group-info" style="font-size:14.5px;display:block;margin-top:4px;"></span>
        </div>

        <div id="instructions">Arraste da branca • <strong>R</strong> Reiniciar</div>
        <button onclick="createBalls()">Novo Jogo</button>
        <div id="win-message"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');

        const W = 900, H = 500;
        const BORDER = 40;
        const BALL_RADIUS = 14;
        const POCKET_RADIUS = 22;
        const FRICTION = 0.977;

        let balls = [], cueBall = null;
        let isAiming = false, aimStartX = 0, aimStartY = 0;
        let sunkBalls = 0, currentPlayer = 1, gameWon = false;
        let playerGroups = {1: null, 2: null};
        let lastSunkThisTurn = 0;
        let particles = [];

        const pockets = [
            {x:BORDER, y:BORDER}, {x:W/2,y:BORDER}, {x:W-BORDER,y:BORDER},
            {x:BORDER,y:H-BORDER}, {x:W/2,y:H-BORDER}, {x:W-BORDER,y:H-BORDER}
        ];

        const ballColors = ['#fff','#e74c3c','#3498db','#f39c12','#9b59b6','#f1c40f','#2ecc71','#c0392b','#111'];

        class Ball {
            constructor(x, y, num) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.number = num;
                this.radius = BALL_RADIUS;
                this.color = ballColors[num] || '#111';
                this.sunk = false;
            }
            update() {
                if (this.sunk) return;
                this.x += this.vx; this.y += this.vy;
                this.vx *= FRICTION; this.vy *= FRICTION;
                if (Math.abs(this.vx) < 0.07) this.vx = 0;
                if (Math.abs(this.vy) < 0.07) this.vy = 0;

                if (this.x - this.radius < BORDER) { this.x = BORDER + this.radius; this.vx *= -0.87; }
                if (this.x + this.radius > W - BORDER) { this.x = W - BORDER - this.radius; this.vx *= -0.87; }
                if (this.y - this.radius < BORDER) { this.y = BORDER + this.radius; this.vy *= -0.87; }
                if (this.y + this.radius > H - BORDER) { this.y = H - BORDER - this.radius; this.vy *= -0.87; }
            }
            draw() {
                if (this.sunk) return;
                const speed = Math.hypot(this.vx, this.vy);

                ctx.shadowColor = 'rgba(0,0,0,0.92)';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetX = 8; ctx.shadowOffsetY = 9;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = `rgba(255,255,255,${0.6 + speed*0.045})`;
                ctx.beginPath();
                ctx.arc(this.x-7, this.y-8, 8.5, 0, Math.PI*2);
                ctx.fill();

                if (this.number > 0) {
                    ctx.fillStyle = this.number === 8 ? '#fff' : '#000';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 1.5);
                }
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random()-0.5)*6;
                this.vy = (Math.random()-0.5)*6;
                this.life = 28;
                this.color = `hsl(${Math.random()*60 + 10}, 90%, 65%)`;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life--; this.vx*=0.96; this.vy*=0.96; }
            draw() {
                ctx.globalAlpha = this.life/28;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 4, 4);
            }
        }

        function createBalls() {
            balls = []; particles = [];
            sunkBalls = 0; currentPlayer = 1; gameWon = false;
            playerGroups = {1: null, 2: null};
            lastSunkThisTurn = 0;
            winMessage.style.display = 'none';

            updateUI();

            cueBall = new Ball(230, H/2, 0);
            balls.push(cueBall);

            const startX = 640, startY = H/2 - 29;
            const positions = [
                {x:0,y:0,n:1},{x:1,y:-1,n:2},{x:1,y:1,n:3},
                {x:2,y:-2,n:4},{x:2,y:0,n:8},{x:2,y:2,n:5},
                {x:3,y:-1,n:6},{x:3,y:1,n:7}
            ];

            positions.forEach(p => {
                const x = startX + p.x * (BALL_RADIUS * 2.17);
                const y = startY + p.y * (BALL_RADIUS * 2.13);
                balls.push(new Ball(x, y, p.n));
            });
        }

        function updateUI() {
            document.getElementById('balls-left').textContent = 7 - sunkBalls;
            const el = document.getElementById('current-player');
            el.textContent = `Jogador ${currentPlayer}`;
            el.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';

            const g = playerGroups[currentPlayer];
            document.getElementById('group-info').textContent = g ? 
                (g === 'solid' ? '● Sólidas' : '▥ Listadas') : 'Mesa Aberta';
        }

        function respawnCueBall() {
            if (cueBall) {
                cueBall.x = 230; cueBall.y = H/2;
                cueBall.vx = cueBall.vy = 0;
                cueBall.sunk = false;
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration, type='triangle', vol=0.75) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.value = vol;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration + 0.15);
        }

        function createParticles(x, y, count=18) {
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y));
        }

        function drawTable() {
            ctx.fillStyle = '#0b520b';
            ctx.fillRect(BORDER, BORDER, W-BORDER*2, H-BORDER*2);

            ctx.strokeStyle = '#3c2a1f';
            ctx.lineWidth = 44;
            ctx.strokeRect(BORDER/2, BORDER/2, W-BORDER, H-BORDER);

            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(W/2, BORDER+20);
            ctx.lineTo(W/2, H-BORDER-20);
            ctx.stroke();

            ctx.fillStyle = '#111';
            pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI*2);
                ctx.fill();
            });
        }

        function checkCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i+1; j < balls.length; j++) {
                    const a = balls[i], b = balls[j];
                    if (a.sunk || b.sunk) continue;

                    const dx = b.x - a.x, dy = b.y - a.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < a.radius + b.radius && dist > 0) {
                        const speed = Math.hypot(a.vx,a.vy) + Math.hypot(b.vx,b.vy);
                        if (speed > 3) {
                            playSound(95 + speed*8, 0.18, 'triangle', Math.min(1, speed/25));
                            createParticles((a.x+b.x)/2, (a.y+b.y)/2, 12);
                        }

                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle), cos = Math.cos(angle);
                        const v1 = a.vx*cos + a.vy*sin;
                        const v2 = b.vx*cos + b.vy*sin;

                        a.vx = (v2*cos - v1*sin)*0.965;
                        a.vy = (v1*cos + v2*sin)*0.965;
                        b.vx = (v1*cos - v2*sin)*0.965;
                        b.vy = (v2*cos + v1*sin)*0.965;

                        const overlap = (a.radius + b.radius - dist)/2;
                        a.x -= dx/dist * overlap;
                        a.y -= dy/dist * overlap;
                        b.x += dx/dist * overlap;
                        b.y += dy/dist * overlap;
                    }
                }
            }
        }

        function checkPockets() {
            let sunkThisTurn = 0;
            for (let ball of balls) {
                if (ball.sunk) continue;
                for (let p of pockets) {
                    if (Math.hypot(ball.x-p.x, ball.y-p.y) < POCKET_RADIUS + BALL_RADIUS - 6) {
                        ball.sunk = true;
                        ball.vx = ball.vy = 0;
                        createParticles(ball.x, ball.y, 22);

                        if (ball.number === 0) {
                            respawnCueBall();
                            playSound(200, 0.7, 'sine', 0.5);
                        } else {
                            sunkBalls++;
                            sunkThisTurn++;
                            playSound(58, 0.7, 'sine', 0.95);
                            
                            if (!playerGroups[currentPlayer] && ball.number !== 8) {
                                playerGroups[currentPlayer] = ball.number <= 7 ? 'solid' : 'stripe';
                                playerGroups[currentPlayer===1?2:1] = playerGroups[currentPlayer] === 'solid' ? 'stripe' : 'solid';
                            }
                        }
                        break;
                    }
                }
            }
            return sunkThisTurn;
        }

        function allBallsStopped() {
            return balls.every(b => b.sunk || (Math.abs(b.vx)<0.09 && Math.abs(b.vy)<0.09));
        }

        function drawCueStick() {
            if (!isAiming || !cueBall || cueBall.sunk) return;
            const dx = cueBall.x - aimStartX;
            const dy = cueBall.y - aimStartY;
            const dist = Math.hypot(dx, dy);
            const power = Math.min(dist / 4.7, 100);
            const angle = Math.atan2(dy, dx);
            const dirX = Math.cos(angle), dirY = Math.sin(angle);

            ctx.strokeStyle = '#d2b48c';
            ctx.lineWidth = 7.5;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 18;
            ctx.shadowColor = 'rgba(0,0,0,0.9)';
            ctx.beginPath();
            ctx.moveTo(cueBall.x - dirX*33, cueBall.y - dirY*33);
            ctx.lineTo(cueBall.x - dirX*(82 + power*2.4), cueBall.y - dirY*(82 + power*2.4));
            ctx.stroke();

            ctx.strokeStyle = '#eee';
            ctx.lineWidth = 3.8;
            ctx.beginPath();
            ctx.moveTo(cueBall.x - dirX*37, cueBall.y - dirY*37);
            ctx.lineTo(cueBall.x - dirX*52, cueBall.y - dirY*52);
            ctx.stroke();

            ctx.strokeStyle = `rgba(255, 250, 130, ${0.8 - power/220})`;
            ctx.lineWidth = 2.4;
            ctx.setLineDash([5, 26]);
            ctx.beginPath();
            ctx.moveTo(cueBall.x, cueBall.y);
            ctx.lineTo(cueBall.x + dirX*1000, cueBall.y + dirY*1000);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#111';
            ctx.fillRect(cueBall.x-22, cueBall.y-55, 44, 9);
            ctx.fillStyle = power > 72 ? '#ff4444' : '#ffeb3b';
            ctx.fillRect(cueBall.x-21, cueBall.y-54, 42*(power/100), 7);
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateUI();
        }

        function checkWin() {
            if (gameWon) return;
            const eight = balls.find(b => b.number === 8);
            if (eight && eight.sunk) {
                gameWon = true;
                winMessage.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';
                winMessage.innerHTML = `🎉 JOGADOR ${currentPlayer}<br>VENCEU!`;
                winMessage.style.display = 'block';
                setTimeout(createBalls, 5000);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, W, H);
            drawTable();

            balls.forEach(b => { b.update(); b.draw(); });
            particles = particles.filter(p => { p.update(); p.draw(); return p.life > 0; });

            checkCollisions();
            const sunkThisTurn = checkPockets();

            if (isAiming) drawCueStick();

            if (allBallsStopped() && !gameWon) {
                if (sunkThisTurn === 0 && lastSunkThisTurn === 0) switchPlayer();
                lastSunkThisTurn = sunkThisTurn;
                checkWin();
            }

            requestAnimationFrame(gameLoop);
        }

        // === CONTROLES ===
        function startAim(x, y) {
            if (gameWon || !cueBall || !allBallsStopped() || cueBall.sunk) return;
            isAiming = true;
            aimStartX = x; aimStartY = y;
        }

        function shoot(x, y) {
            if (!isAiming || !cueBall) return;
            const dx = cueBall.x - x;
            const dy = cueBall.y - y;
            const power = Math.min(Math.hypot(dx, dy) * 0.152, 24);
            cueBall.vx = dx * 0.152;
            cueBall.vy = dy * 0.152;
            isAiming = false;
            lastSunkThisTurn = 0;
        }

        ['mousedown','touchstart'].forEach(ev => canvas.addEventListener(ev, e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            startAim(x, y);
        }, {passive:false}));

        canvas.addEventListener('mousemove', e => {
            if (isAiming) {
                const rect = canvas.getBoundingClientRect();
                aimStartX = e.clientX - rect.left;
                aimStartY = e.clientY - rect.top;
            }
        });

        ['mouseup','touchend'].forEach(ev => canvas.addEventListener(ev, e => {
            e.preventDefault();
            if (!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.changedTouches[0].clientX) - rect.left;
            const y = (e.clientY || e.changedTouches[0].clientY) - rect.top;
            shoot(x, y);
        }, {passive:false}));

        document.addEventListener('keydown', e => { if (e.key.toLowerCase() === 'r') createBalls(); });

        // Iniciar
        createBalls();
        gameLoop();
    </script>
</body>
</html>
