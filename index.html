<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca 8 Bolas - 2 Jogadores</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a1f0a;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            border: 14px solid #3c2a1f;
            border-radius: 18px;
            box-shadow: 0 0 50px rgba(0,0,0,0.95);
        }
        canvas {
            display: block;
            background: #0b4d0b;
            border-radius: 4px;
        }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            background: rgba(0,0,0,0.8);
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 15px;
            z-index: 10;
            min-width: 220px;
        }
        #turn-info {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #fff;
            background: rgba(0,0,0,0.8);
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 15px;
            z-index: 10;
            text-align: center;
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #ccc;
            background: rgba(0,0,0,0.8);
            padding: 9px 24px;
            border-radius: 10px;
            font-size: 13.5px;
            z-index: 10;
        }
        #win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 52px;
            font-weight: bold;
            text-shadow: 0 0 30px #0f0;
            pointer-events: none;
            display: none;
            z-index: 30;
            text-align: center;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="900" height="500"></canvas>
        
        <div id="info">
            <strong>Sinuca 8 Bolas</strong><br>
            Bolas restantes: <span id="balls-left">7</span>
        </div>
        
        <div id="turn-info">
            <span id="current-player">Jogador 1</span><br>
            <span id="player-group" style="font-size:14px"></span>
        </div>

        <div id="instructions">
            Arraste a bola branca para tacar<br>
            <strong>R</strong> Reiniciar • <strong>C</strong> Afundar 1 • <strong>X</strong> Afundar todas
        </div>
        
        <div id="win-message">
            <div id="winner-text"></div>
            <button onclick="createBalls()">Jogar Novamente</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');
        const winnerText = document.getElementById('winner-text');

        const TABLE_WIDTH = 900;
        const TABLE_HEIGHT = 500;
        const BORDER = 40;
        const POCKET_RADIUS = 19;
        const BALL_RADIUS = 14;
        const FRICTION = 0.978;

        let balls = [];
        let cueBall = null;
        let isAiming = false;
        let aimStartX = 0, aimStartY = 0;
        let sunkBalls = 0;
        let currentPlayer = 1;
        let player1Group = null; // 'low' ou 'high'
        let player2Group = null;
        let gameWon = false;
        let foul = false;

        const pockets = [
            {x: BORDER, y: BORDER}, {x: TABLE_WIDTH/2, y: BORDER}, {x: TABLE_WIDTH - BORDER, y: BORDER},
            {x: BORDER, y: TABLE_HEIGHT - BORDER}, {x: TABLE_WIDTH/2, y: TABLE_HEIGHT - BORDER}, 
            {x: TABLE_WIDTH - BORDER, y: TABLE_HEIGHT - BORDER}
        ];

        const ballColors = ['#ffffff', '#e74c3c', '#3498db', '#f39c12', '#9b59b6', '#f1c40f', '#2ecc71', '#c0392b', '#111111'];

        class Ball {
            constructor(x, y, number) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.number = number;
                this.radius = BALL_RADIUS;
                this.color = ballColors[number] || '#111';
                this.sunk = false;
            }
            // ... (mesmo update e draw das versões anteriores)
            update() {
                if (this.sunk) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;
                if (Math.abs(this.vx) < 0.1) this.vx = 0;
                if (Math.abs(this.vy) < 0.1) this.vy = 0;

                if (this.x - this.radius < BORDER) { this.x = BORDER + this.radius; this.vx = -this.vx * 0.85; }
                if (this.x + this.radius > TABLE_WIDTH - BORDER) { this.x = TABLE_WIDTH - BORDER - this.radius; this.vx = -this.vx * 0.85; }
                if (this.y - this.radius < BORDER) { this.y = BORDER + this.radius; this.vy = -this.vy * 0.85; }
                if (this.y + this.radius > TABLE_HEIGHT - BORDER) { this.y = TABLE_HEIGHT - BORDER - this.radius; this.vy = -this.vy * 0.85; }
            }

            draw() {
                if (this.sunk) return;
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 12;
                ctx.shadowOffsetX = 4;
                ctx.shadowOffsetY = 5;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(this.x - 5.5, this.y - 5.5, 7, 0, Math.PI * 2);
                ctx.fill();

                if (this.number > 0) {
                    ctx.fillStyle = this.number === 8 ? '#fff' : '#000';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 1);
                }
            }
        }

        function createBalls() {
            balls = [];
            sunkBalls = 0;
            gameWon = false;
            player1Group = null;
            player2Group = null;
            currentPlayer = 1;
            foul = false;
            winMessage.style.display = 'none';

            document.getElementById('balls-left').textContent = '7';
            updateTurnInfo();

            cueBall = new Ball(235, TABLE_HEIGHT/2, 0);
            balls.push(cueBall);

            const startX = 635;
            const startY = TABLE_HEIGHT/2 - 22;
            const positions = [
                {x:0, y:0, num:1}, {x:1, y:-1, num:2}, {x:1, y:1, num:3},
                {x:2, y:-2, num:4}, {x:2, y:0, num:8}, {x:2, y:2, num:5},
                {x:3, y:-1, num:6}, {x:3, y:1, num:7}
            ];

            positions.forEach(p => {
                const x = startX + p.x * (BALL_RADIUS * 2.13);
                const y = startY + p.y * (BALL_RADIUS * 2.09);
                balls.push(new Ball(x, y, p.num));
            });
        }

        function updateTurnInfo() {
            const playerEl = document.getElementById('current-player');
            const groupEl = document.getElementById('player-group');
            
            playerEl.textContent = `Jogador ${currentPlayer}`;
            playerEl.style.color = currentPlayer === 1 ? '#ffeb3b' : '#4fc3f7';

            if (player1Group) {
                const groupName = currentPlayer === 1 ? 
                    (player1Group === 'low' ? 'Sólidas (1-4)' : 'Listadas (5-7)') :
                    (player2Group === 'low' ? 'Sólidas (1-4)' : 'Listadas (5-7)');
                groupEl.textContent = groupName;
            } else {
                groupEl.textContent = "Atribuição após primeira bola";
            }
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateTurnInfo();
        }

        function isValidBall(ball) {
            if (!player1Group) return true; // Ainda não definido
            const group = currentPlayer === 1 ? player1Group : player2Group;
            if (ball.number === 8) return true;
            return group === 'low' ? ball.number <= 4 : ball.number >= 5;
        }

        function checkWin() {
            if (gameWon) return;
            
            let playerBallsLeft = 0;
            balls.forEach(b => {
                if (!b.sunk && b.number !== 0 && b.number !== 8) {
                    if (isValidBall(b)) playerBallsLeft++;
                }
            });

            // Verifica se o jogador atual afundou a 8
            const eightBall = balls.find(b => b.number === 8);
            if (eightBall && eightBall.sunk && playerBallsLeft === 0) {
                gameWon = true;
                winnerText.innerHTML = `🎉 JOGADOR ${currentPlayer} VENCEU!`;
                winMessage.style.display = 'block';
            }
        }

        // ==================== RESTANTE DO CÓDIGO (desenho, física, controles) ====================
        // ... (Mantive o mesmo padrão das versões anteriores, só adicionei lógica de 2 jogadores)

        function respawnCueBall() {
            if (cueBall) {
                cueBall.x = 235;
                cueBall.y = TABLE_HEIGHT / 2;
                cueBall.vx = cueBall.vy = 0;
                cueBall.sunk = false;
            }
        }

        function checkPockets() {
            let sunkThisTurn = false;
            for (let ball of balls) {
                if (ball.sunk) continue;
                for (let p of pockets) {
                    if (Math.hypot(ball.x - p.x, ball.y - p.y) < POCKET_RADIUS + BALL_RADIUS - 5) {
                        ball.sunk = true;
                        ball.vx = ball.vy = 0;

                        if (ball.number === 0) {
                            foul = true;
                            respawnCueBall();
                        } else {
                            sunkThisTurn = true;
                            if (ball.number !== 8) sunkBalls++;
                            document.getElementById('balls-left').textContent = 7 - sunkBalls;

                            // Atribui grupos na primeira bola afundada
                            if (!player1Group && ball.number !== 8) {
                                player1Group = ball.number <= 4 ? 'low' : 'high';
                                player2Group = player1Group === 'low' ? 'high' : 'low';
                                updateTurnInfo();
                            }
                        }
                        break;
                    }
                }
            }

            if (foul) {
                switchPlayer();
                foul = false;
            } else if (!sunkThisTurn || !isValidBall(balls.find(b => !b.sunk && b.number !== 0))) {
                switchPlayer();
            }

            checkWin();
        }

        // (O resto do código - drawTable, checkCollisions, drawAimLine, gameLoop, controles - permanece similar)

        function gameLoop() {
            ctx.clearRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);
            drawTable();

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            checkCollisions();
            checkPockets();

            if (isAiming) drawAimLine();

            if (allBallsStopped()) checkWin();

            requestAnimationFrame(gameLoop);
        }

        // Controles (mouse + touch) permanecem iguais às versões anteriores

        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') createBalls();
            if (e.key.toLowerCase() === 'c') sinkOneBall();
            if (e.key.toLowerCase() === 'x') sinkAllBalls();
        });

        // Inicializar
        createBalls();
        gameLoop();
    </script>
</body>
</html>
