<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca 8 Bolas - 2 Jogadores</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #061406;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            border: 20px solid #3c2a1f;
            border-radius: 28px;
            box-shadow: 0 0 90px rgba(0,0,0,0.98);
            background: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
            border-radius: 10px;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.85);
            padding: 15px 25px;
            border-radius: 16px;
            font-size: 17px;
            z-index: 10;
            user-select: none;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            min-width: 200px;
        }
        #current-player {
            font-size: 24px;
            font-weight: bold;
            margin-top: 8px;
            display: block;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ddd;
            background: rgba(0,0,0,0.8);
            padding: 12px 32px;
            border-radius: 16px;
            font-size: 15px;
            z-index: 10;
            user-select: none;
            white-space: nowrap;
        }
        #win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 0 60px #0f0;
            pointer-events: none;
            display: none;
            z-index: 30;
            animation: winPop 0.8s ease;
            text-align: center;
            line-height: 1.1;
        }
        @keyframes winPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="900" height="500"></canvas>
       
        <div id="info">
            <strong>Sinuca 8 Bolas</strong><br>
            Bolas restantes: <span id="balls-left">7</span><br>
            <span id="current-player">Jogador 1</span>
            <span id="group-info" style="font-size:14px; display:block; margin-top:4px;"></span>
        </div>
        <div id="instructions">
            Arraste da bola branca • <strong>R</strong> Reiniciar
        </div>
        <div id="win-message"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');
        const W = 900, H = 500;
        const BORDER = 40;
        const BALL_RADIUS = 14;
        const POCKET_RADIUS = 22;
        const FRICTION = 0.978;
        
        let balls = [], cueBall = null;
        let isAiming = false, aimStartX = 0, aimStartY = 0;
        let sunkBalls = 0, currentPlayer = 1, gameWon = false;
        let playerGroups = {1: null, 2: null};
        let lastSunkThisTurn = 0;
        let sunkBallsList = []; // Para mostrar bolas afundadas

        const pockets = [
            {x: BORDER, y: BORDER}, {x: W/2, y: BORDER}, {x: W - BORDER, y: BORDER},
            {x: BORDER, y: H - BORDER}, {x: W/2, y: H - BORDER}, {x: W - BORDER, y: H - BORDER}
        ];
        
        const ballColors = ['#fff','#e74c3c','#3498db','#f39c12','#9b59b6','#f1c40f','#2ecc71','#c0392b','#111',
                            '#e74c3c','#3498db','#f39c12','#9b59b6','#f1c40f','#2ecc71','#c0392b'];

        class Ball {
            constructor(x, y, num) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.number = num;
                this.radius = BALL_RADIUS;
                this.color = ballColors[num] || '#111';
                this.sunk = false;
            }
            update() {
                if (this.sunk) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;
                if (Math.abs(this.vx) < 0.08) this.vx = 0;
                if (Math.abs(this.vy) < 0.08) this.vy = 0;

                if (this.x - this.radius < BORDER) { this.x = BORDER + this.radius; this.vx = -this.vx * 0.88; }
                if (this.x + this.radius > W - BORDER) { this.x = W - BORDER - this.radius; this.vx = -this.vx * 0.88; }
                if (this.y - this.radius < BORDER) { this.y = BORDER + this.radius; this.vy = -this.vy * 0.88; }
                if (this.y + this.radius > H - BORDER) { this.y = H - BORDER - this.radius; this.vy = -this.vy * 0.88; }
            }
            draw() {
                if (this.sunk) return;
                const speed = Math.hypot(this.vx, this.vy);

                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 18;
                ctx.shadowOffsetX = 7;
                ctx.shadowOffsetY = 8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = `rgba(255,255,255,${0.55 + speed * 0.04})`;
                ctx.beginPath();
                ctx.arc(this.x - 6.5, this.y - 7.5, 8.5, 0, Math.PI * 2);
                ctx.fill();

                if (this.number > 0) {
                    ctx.fillStyle = this.number === 8 ? '#fff' : '#000';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 1.5);
                }
            }
        }

        function createBalls() {
            balls = [];
            sunkBallsList = [];
            sunkBalls = 0;
            currentPlayer = 1;
            gameWon = false;
            playerGroups = {1: null, 2: null};
            lastSunkThisTurn = 0;
            winMessage.style.display = 'none';
            updateUI();

            cueBall = new Ball(230, H/2, 0);
            balls.push(cueBall);

            const startX = 640;
            const startY = H/2 - 28;
            const positions = [
                {x:0, y:0, n:1}, {x:1,y:-1,n:2}, {x:1,y:1,n:3},
                {x:2,y:-2,n:4}, {x:2,y:0,n:8}, {x:2,y:2,n:5},
                {x:3,y:-1,n:6}, {x:3,y:1,n:7}
            ];

            positions.forEach(p => {
                const x = startX + p.x * (BALL_RADIUS * 2.16);
                const y = startY + p.y * (BALL_RADIUS * 2.12);
                balls.push(new Ball(x, y, p.n));
            });
        }

        function updateUI() {
            document.getElementById('balls-left').textContent = 7 - sunkBalls;
            const playerEl = document.getElementById('current-player');
            playerEl.textContent = `Jogador ${currentPlayer}`;
            playerEl.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';
            
            const groupEl = document.getElementById('group-info');
            const group = playerGroups[currentPlayer];
            groupEl.textContent = group ? (group === 'solid' ? '● Sólidas' : '▥ Listadas') : 'Mesa Aberta';
        }

        function respawnCueBall() {
            if (cueBall) {
                cueBall.x = 230;
                cueBall.y = H / 2;
                cueBall.vx = cueBall.vy = 0;
                cueBall.sunk = false;
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration, type = 'triangle', vol = 0.7) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.value = vol;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration + 0.1);
        }

        function drawTable() {
            ctx.fillStyle = '#0a4a0a';
            ctx.fillRect(BORDER, BORDER, W - BORDER*2, H - BORDER*2);
            
            ctx.strokeStyle = '#3c2a1f';
            ctx.lineWidth = 42;
            ctx.strokeRect(BORDER/2, BORDER/2, W - BORDER, H - BORDER);

            ctx.strokeStyle = 'rgba(255,255,255,0.18)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(W/2, BORDER + 18);
            ctx.lineTo(W/2, H - BORDER - 18);
            ctx.stroke();

            ctx.fillStyle = '#111';
            pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // === NOVO: Desenhar bolas afundadas nos lados ===
        function drawSunkBalls() {
            const sunkOnes = balls.filter(b => b.sunk && b.number !== 0);
            
            // Lado esquerdo (Jogador 1)
            sunkOnes.forEach((ball, i) => {
                const x = 65 + (i % 4) * 32;
                const y = H - 65 - Math.floor(i / 4) * 32;
                drawSmallBall(x, y, ball.color, ball.number);
            });

            // Lado direito (Jogador 2) - começa do final
            const rightSunk = sunkOnes.slice(4);
            rightSunk.forEach((ball, i) => {
                const x = W - 65 - (i % 4) * 32;
                const y = H - 65 - Math.floor(i / 4) * 32;
                drawSmallBall(x, y, ball.color, ball.number);
            });
        }

        function drawSmallBall(x, y, color, number) {
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 4;
            
            ctx.beginPath();
            ctx.arc(x, y, 11, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.shadowBlur = 0;

            if (number > 0) {
                ctx.fillStyle = number === 8 ? '#fff' : '#000';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(number, x, y + 1);
            }
        }

        function checkCollisions() { /* ... mesmo código anterior ... */ 
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const a = balls[i], b = balls[j];
                    if (a.sunk || b.sunk) continue;
                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < a.radius + b.radius && dist > 0) {
                        const speed = Math.hypot(a.vx, a.vy) + Math.hypot(b.vx, b.vy);
                        playSound(110 + speed * 7, 0.22, 'triangle', Math.min(0.95, speed/20));
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle), cos = Math.cos(angle);
                        const v1 = a.vx * cos + a.vy * sin;
                        const v2 = b.vx * cos + b.vy * sin;
                        a.vx = (v2 * cos - v1 * sin) * 0.97;
                        a.vy = (v1 * cos + v2 * sin) * 0.97;
                        b.vx = (v1 * cos - v2 * sin) * 0.97;
                        b.vy = (v2 * cos + v1 * sin) * 0.97;
                        const overlap = (a.radius + b.radius - dist) / 2;
                        a.x -= dx / dist * overlap;
                        a.y -= dy / dist * overlap;
                        b.x += dx / dist * overlap;
                        b.y += dy / dist * overlap;
                    }
                }
            }
        }

        function checkPockets() {
            let sunkThisTurn = 0;
            for (let ball of balls) {
                if (ball.sunk) continue;
                for (let p of pockets) {
                    if (Math.hypot(ball.x - p.x, ball.y - p.y) < POCKET_RADIUS + BALL_RADIUS - 6) {
                        ball.sunk = true;
                        ball.vx = ball.vy = 0;

                        if (ball.number === 0) {
                            respawnCueBall();
                            playSound(180, 0.8, 'sine', 0.6);
                        } else {
                            sunkBalls++;
                            sunkThisTurn++;
                            playSound(65, 0.65, 'sine', 0.95);

                            if (!playerGroups[currentPlayer] && ball.number !== 8) {
                                const group = ball.number <= 7 ? 'solid' : 'stripe';
                                playerGroups[currentPlayer] = group;
                                playerGroups[currentPlayer === 1 ? 2 : 1] = group === 'solid' ? 'stripe' : 'solid';
                            }
                        }
                        break;
                    }
                }
            }
            return sunkThisTurn;
        }

        function allBallsStopped() {
            return balls.every(b => b.sunk || (Math.abs(b.vx) < 0.1 && Math.abs(b.vy) < 0.1));
        }

        function drawCueStick() { /* mesmo código anterior */ 
            if (!isAiming || !cueBall || cueBall.sunk) return;
            const dx = cueBall.x - aimStartX;
            const dy = cueBall.y - aimStartY;
            const dist = Math.hypot(dx, dy);
            const power = Math.min(dist / 4.8, 100);
            const angle = Math.atan2(dy, dx);
            const dirX = Math.cos(angle);
            const dirY = Math.sin(angle);

            ctx.strokeStyle = '#d2b48c';
            ctx.lineWidth = 7;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0,0,0,0.85)';
            ctx.beginPath();
            ctx.moveTo(cueBall.x - dirX * 32, cueBall.y - dirY * 32);
            ctx.lineTo(cueBall.x - dirX * (80 + power * 2.2), cueBall.y - dirY * (80 + power * 2.2));
            ctx.stroke();

            ctx.strokeStyle = '#eee';
            ctx.lineWidth = 3.5;
            ctx.beginPath();
            ctx.moveTo(cueBall.x - dirX * 35, cueBall.y - dirY * 35);
            ctx.lineTo(cueBall.x - dirX * 48, cueBall.y - dirY * 48);
            ctx.stroke();

            ctx.strokeStyle = `rgba(255, 245, 120, ${0.75 - power/200})`;
            ctx.lineWidth = 2.2;
            ctx.setLineDash([6, 24]);
            ctx.beginPath();
            ctx.moveTo(cueBall.x, cueBall.y);
            ctx.lineTo(cueBall.x + dirX * 980, cueBall.y + dirY * 980);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#111';
            ctx.fillRect(cueBall.x - 21, cueBall.y - 52, 42, 8);
            ctx.fillStyle = power > 75 ? '#ff4444' : '#ffeb3b';
            ctx.fillRect(cueBall.x - 20, cueBall.y - 51, 40 * (power / 100), 6);
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateUI();
        }

        function checkWin() {
            if (gameWon) return;
            const eight = balls.find(b => b.number === 8);
            if (eight && eight.sunk) {
                gameWon = true;
                winMessage.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ff9800';
                winMessage.innerHTML = `🎉 JOGADOR ${currentPlayer}<br>VENCEU!`;
                winMessage.style.display = 'block';
                setTimeout(createBalls, 4800);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, W, H);
            drawTable();
            balls.forEach(ball => { ball.update(); ball.draw(); });
            
            checkCollisions();
            checkPockets();

            if (isAiming) drawCueStick();
            drawSunkBalls();   // ← Nova chamada

            if (allBallsStopped() && !gameWon) {
                if (checkPockets() > 0) {
                    lastSunkThisTurn = 1;
                } else if (lastSunkThisTurn === 0) {
                    switchPlayer();
                }
                lastSunkThisTurn = 0;
                checkWin();
            }

            requestAnimationFrame(gameLoop);
        }

        // Controles (mesmo de antes)
        function startAim(x, y) {
            if (gameWon || !cueBall || !allBallsStopped() || cueBall.sunk) return;
            isAiming = true;
            aimStartX = x;
            aimStartY = y;
        }

        function shoot(x, y) {
            if (!isAiming || !cueBall) return;
            const dx = cueBall.x - x;
            const dy = cueBall.y - y;
            const power = Math.min(Math.hypot(dx, dy) * 0.148, 23);
            cueBall.vx = dx * 0.148;
            cueBall.vy = dy * 0.148;
            isAiming = false;
            lastSunkThisTurn = 0;
        }

        ['mousedown', 'touchstart'].forEach(ev => {
            canvas.addEventListener(ev, e => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                startAim(x, y);
            }, { passive: false });
        });

        canvas.addEventListener('mousemove', e => {
            if (!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            aimStartX = e.clientX - rect.left;
            aimStartY = e.clientY - rect.top;
        });

        ['mouseup', 'touchend'].forEach(ev => {
            canvas.addEventListener(ev, e => {
                e.preventDefault();
                if (!isAiming) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.changedTouches[0].clientX) - rect.left;
                const y = (e.clientY || e.changedTouches[0].clientY) - rect.top;
                shoot(x, y);
            }, { passive: false });
        });

        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') createBalls();
        });

        createBalls();
        gameLoop();
    </script>
</body>
</html>
