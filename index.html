<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca 8 Bolas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a1f0a;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            border: 14px solid #3c2a1f;
            border-radius: 18px;
            box-shadow: 0 0 50px rgba(0,0,0,0.95);
            background: #000;
        }
        canvas {
            display: block;
            background: #0b4d0b;
            border-radius: 4px;
        }
        #info {
            position: absolute;
            top: 18px;
            left: 18px;
            color: #fff;
            background: rgba(0,0,0,0.75);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 15.5px;
            z-index: 10;
            user-select: none;
        }
        #instructions {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: #ccc;
            background: rgba(0,0,0,0.8);
            padding: 9px 24px;
            border-radius: 10px;
            font-size: 13.8px;
            text-align: center;
            z-index: 10;
            user-select: none;
        }
        #win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 62px;
            font-weight: bold;
            text-shadow: 0 0 30px #0f0;
            pointer-events: none;
            display: none;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="900" height="500"></canvas>
        <div id="info">
            <strong>Sinuca 8 Bolas</strong><br>
            Bolas restantes: <span id="balls-left">8</span>
        </div>
        <div id="instructions">
            Arraste a bola branca para tacar<br>
            <strong>R</strong> Reiniciar • <strong>C</strong> Afundar 1 • <strong>X</strong> Afundar todas
        </div>
        <div id="win-message">🎉 VOCÊ VENCEU!</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');

        const TABLE_WIDTH = 900;
        const TABLE_HEIGHT = 500;
        const BORDER = 40;
        const POCKET_RADIUS = 19;
        const BALL_RADIUS = 14;
        const FRICTION = 0.978;

        let balls = [];
        let cueBall = null;
        let isAiming = false;
        let aimStartX = 0, aimStartY = 0;
        let sunkBalls = 0;
        let gameWon = false;

        const pockets = [
            {x: BORDER, y: BORDER}, {x: TABLE_WIDTH/2, y: BORDER}, {x: TABLE_WIDTH - BORDER, y: BORDER},
            {x: BORDER, y: TABLE_HEIGHT - BORDER}, {x: TABLE_WIDTH/2, y: TABLE_HEIGHT - BORDER}, 
            {x: TABLE_WIDTH - BORDER, y: TABLE_HEIGHT - BORDER}
        ];

        const ballColors = ['#ffffff', '#e74c3c', '#3498db', '#f39c12', '#9b59b6', '#f1c40f', '#2ecc71', '#c0392b', '#111111'];

        class Ball {
            constructor(x, y, number) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.number = number;
                this.radius = BALL_RADIUS;
                this.color = ballColors[number] || '#111';
                this.sunk = false;
            }

            update() {
                if (this.sunk) return;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;

                if (Math.abs(this.vx) < 0.1) this.vx = 0;
                if (Math.abs(this.vy) < 0.1) this.vy = 0;

                // Paredes
                if (this.x - this.radius < BORDER) { this.x = BORDER + this.radius; this.vx = -this.vx * 0.85; }
                if (this.x + this.radius > TABLE_WIDTH - BORDER) { this.x = TABLE_WIDTH - BORDER - this.radius; this.vx = -this.vx * 0.85; }
                if (this.y - this.radius < BORDER) { this.y = BORDER + this.radius; this.vy = -this.vy * 0.85; }
                if (this.y + this.radius > TABLE_HEIGHT - BORDER) { this.y = TABLE_HEIGHT - BORDER - this.radius; this.vy = -this.vy * 0.85; }
            }

            draw() {
                if (this.sunk) return;

                const speed = Math.hypot(this.vx, this.vy);

                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 12;
                ctx.shadowOffsetX = 4;
                ctx.shadowOffsetY = 5;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // Brilho dinâmico
                ctx.shadowBlur = 0;
                ctx.fillStyle = `rgba(255,255,255,${0.35 + speed * 0.02})`;
                ctx.beginPath();
                ctx.arc(this.x - 5.5, this.y - 5.5, 7, 0, Math.PI * 2);
                ctx.fill();

                if (this.number > 0) {
                    ctx.fillStyle = this.number === 8 ? '#fff' : '#000';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 1);
                }
            }
        }

        function createBalls() {
            balls = [];
            sunkBalls = 0;
            gameWon = false;
            winMessage.style.display = 'none';
            document.getElementById('balls-left').textContent = '8';

            cueBall = new Ball(235, TABLE_HEIGHT/2, 0);
            balls.push(cueBall);

            const startX = 635;
            const startY = TABLE_HEIGHT/2 - 22;
            const positions = [
                {x:0, y:0, num:1},
                {x:1, y:-1, num:2}, {x:1, y:1, num:3},
                {x:2, y:-2, num:4}, {x:2, y:0, num:8}, {x:2, y:2, num:5},
                {x:3, y:-1, num:6}, {x:3, y:1, num:7}
            ];

            positions.forEach(p => {
                const x = startX + p.x * (BALL_RADIUS * 2.13);
                const y = startY + p.y * (BALL_RADIUS * 2.09);
                balls.push(new Ball(x, y, p.num));
            });
        }

        function respawnCueBall() {
            if (cueBall) {
                cueBall.x = 235;
                cueBall.y = TABLE_HEIGHT / 2;
                cueBall.vx = cueBall.vy = 0;
                cueBall.sunk = false;
            }
        }

        // ==================== ÁUDIO ====================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playHitSound(volume = 0.6) {
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(180, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            oscillator.connect(gain).connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.35);
        }

        // ==================== DESENHO ====================
        function drawTable() {
            ctx.fillStyle = '#0b4d0b';
            ctx.fillRect(BORDER, BORDER, TABLE_WIDTH - BORDER*2, TABLE_HEIGHT - BORDER*2);

            ctx.strokeStyle = '#3c2a1f';
            ctx.lineWidth = 32;
            ctx.strokeRect(BORDER/2, BORDER/2, TABLE_WIDTH - BORDER, TABLE_HEIGHT - BORDER);

            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(TABLE_WIDTH/2, BORDER + 10);
            ctx.lineTo(TABLE_WIDTH/2, TABLE_HEIGHT - BORDER - 10);
            ctx.stroke();

            ctx.fillStyle = '#0a0a0a';
            pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function checkCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    if (b1.sunk || b2.sunk) continue;

                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < b1.radius + b2.radius && dist > 0) {
                        playHitSound(Math.min(1, Math.hypot(b1.vx, b1.vy) / 12));

                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle), cos = Math.cos(angle);

                        const v1 = b1.vx * cos + b1.vy * sin;
                        const v2 = b2.vx * cos + b2.vy * sin;

                        b1.vx = (v2 * cos - v1 * sin);
                        b1.vy = (v1 * cos + v2 * sin);
                        b2.vx = (v1 * cos - v2 * sin);
                        b2.vy = (v2 * cos + v1 * sin);

                        const overlap = (b1.radius + b2.radius - dist) / 2;
                        b1.x -= dx / dist * overlap;
                        b1.y -= dy / dist * overlap;
                        b2.x += dx / dist * overlap;
                        b2.y += dy / dist * overlap;
                    }
                }
            }
        }

        function checkPockets() {
            for (let ball of balls) {
                if (ball.sunk) continue;
                for (let p of pockets) {
                    if (Math.hypot(ball.x - p.x, ball.y - p.y) < POCKET_RADIUS + BALL_RADIUS - 5) {
                        ball.sunk = true;
                        ball.vx = ball.vy = 0;

                        if (ball.number === 0) {
                            respawnCueBall();
                        } else {
                            sunkBalls++;
                            document.getElementById('balls-left').textContent = 8 - sunkBalls;
                        }
                        playHitSound(0.8);
                        break;
                    }
                }
            }
        }

        function allBallsStopped() {
            return balls.every(b => b.sunk || (Math.abs(b.vx) < 0.12 && Math.abs(b.vy) < 0.12));
        }

        function drawAimLine() {
            if (!isAiming || !cueBall || cueBall.sunk) return;

            const dx = cueBall.x - aimStartX;
            const dy = cueBall.y - aimStartY;
            const dist = Math.hypot(dx, dy);
            const power = Math.min(dist / 3.5, 100);

            const angle = Math.atan2(dy, dx);
            const dirX = Math.cos(angle);
            const dirY = Math.sin(angle);

            // Linha de mira
            ctx.strokeStyle = 'rgba(255,255,255,0.85)';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([8, 20]);
            ctx.beginPath();
            ctx.moveTo(cueBall.x, cueBall.y);
            ctx.lineTo(cueBall.x + dirX * 950, cueBall.y + dirY * 950);
            ctx.stroke();
            ctx.setLineDash([]);

            // Pontos
            ctx.fillStyle = '#ffeb3b';
            for (let i = 1; i < 14; i++) {
                const x = cueBall.x + dirX * (40 + i * 52);
                const y = cueBall.y + dirY * (40 + i * 52);
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function checkWin() {
            if (gameWon || sunkBalls < 8) return;
            gameWon = true;
            winMessage.style.display = 'block';
            setTimeout(createBalls, 3200);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);
            drawTable();

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            checkCollisions();
            checkPockets();

            if (isAiming) drawAimLine();

            if (allBallsStopped()) checkWin();

            requestAnimationFrame(gameLoop);
        }

        // ==================== CONTROLES ====================
        function startAim(x, y) {
            if (gameWon || !cueBall || !allBallsStopped() || cueBall.sunk) return;
            isAiming = true;
            aimStartX = x;
            aimStartY = y;
        }

        function shoot(x, y) {
            if (!isAiming || !cueBall) return;
            const dx = cueBall.x - x;
            const dy = cueBall.y - y;
            const power = Math.min(Math.hypot(dx, dy) * 0.135, 19);

            cueBall.vx = dx * 0.135;
            cueBall.vy = dy * 0.135;
            isAiming = false;
        }

        // Mouse
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            startAim(x, y);
        });

        canvas.addEventListener('mousemove', e => {
            if (!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            aimStartX = e.clientX - rect.left;
            aimStartY = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseup', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            shoot(x, y);
        });

        // Touch
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            startAim(x, y);
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            if (!isAiming) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            aimStartX = touch.clientX - rect.left;
            aimStartY = touch.clientY - rect.top;
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            if (!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.changedTouches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            shoot(x, y);
        }, { passive: false });

        // Teclado
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'r') createBalls();
            if (e.key.toLowerCase() === 'c') {
                for (let ball of balls) {
                    if (ball.number !== 0 && !ball.sunk) {
                        ball.sunk = true;
                        sunkBalls++;
                        document.getElementById('balls-left').textContent = 8 - sunkBalls;
                        return;
                    }
                }
            }
            if (e.key.toLowerCase() === 'x') {
                balls.forEach(b => { if (b.number !== 0) b.sunk = true; });
                sunkBalls = 8;
                document.getElementById('balls-left').textContent = '0';
            }
        });

        // Iniciar
        createBalls();
        gameLoop();
    </script>
</body>
</html>
